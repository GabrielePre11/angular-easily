<section class="cars-section" aria-label="Cars Section">
  <div class="container">
    <app-section-heading
      [sectionTitle]="'Most popular cars rental deals'"
      [sectionSubtitle]="'Popular Cars'"
      [personalizedClass]="'items-center'"
    />

    <ul class="cars">
      @for (car of cars; track car.id) {
      <app-car-card [car]="car" />
      }
    </ul>

    <button class="show-all-btn">Show All</button>
  </div>
</section>
