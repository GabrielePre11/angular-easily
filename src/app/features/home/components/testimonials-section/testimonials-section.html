<section class="testimonials-section" aria-label="Testimonials Section">
  <div class="container">
    <app-section-heading
      [sectionTitle]="'What our customers say'"
      [sectionSubtitle]="'Testimonials'"
      [personalizedClass]="'items-center'"
    />

    <!-- ========== Testimonials Stars ========== -->
    <ul class="testimonials-stars">
      @for (star of stars; track star) {
      <li>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-star-icon lucide-star star"
        >
          <path
            d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"
          />
        </svg>
      </li>
      }
    </ul>

    <!-- ========== Testimonials Slider ========== -->
    <ul
      class="testimonials-slider"
      aria-orientation="horizontal"
      role="slider"
      aria-live="polite"
      #testimonialsSliderRef
    >
      @for (testimonial of testimonials; track testimonial.id) {
      <li class="testimonial">
        <blockquote class="testimonial-quote">
          {{ testimonial.desc }}
        </blockquote>
        <h3 class="testimonial-name">{{ testimonial.name }}</h3>
      </li>
      }
    </ul>

    <!-- ========== Slider Arrows ========== -->
    <div class="slider-arrows">
      <button
        class="arrow"
        aria-label="Go to Previous Slide"
        (click)="goToPrevSlide()"
      >
        <lucide-angular [img]="ArrowLeft" size="27" />
      </button>

      <button
        class="arrow"
        aria-label="Next Slide"
        aria-label="Go to Next Slide"
        (click)="goToNextSlide()"
      >
        <lucide-angular [img]="ArrowRight" size="27" />
      </button>
    </div>

    <!-- ========== Testimonials Double Quotes ========== -->
    <figure class="testimonials-quotes">
      <img
        src="/testimonials-quotes.png"
        alt="Testimonials Left Quotes"
        class="testimonials-left-quote"
      />

      <img
        src="/testimonials-quotes.png"
        alt="Testimonials Right Quotes"
        class="testimonials-right-quote"
      />
    </figure>
  </div>
</section>
