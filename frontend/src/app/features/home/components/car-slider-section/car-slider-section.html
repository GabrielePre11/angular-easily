<section class="car-slider" aria-label="Cars Slider Section">
  <ul class="cars-logos">
    @for (logo of carsLogos; track $index) {
    <li class="logo">
      <img
        [src]="logo.url"
        [alt]="`${logo.name}'s logo`"
        width="150"
        height="150"
        loading="lazy"
        class="car-logo"
      />
    </li>
    }
  </ul>
</section>
