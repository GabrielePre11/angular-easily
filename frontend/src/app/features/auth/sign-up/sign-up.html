<section class="sign-up-section" aria-label="Register Page">
  <div class="container">
    <form class="form" formGroup="signUpForm" (submit)="onSubmit($event)">
      <!--============== Heading ==============-->
      <h3 class="form-title">Create an Account</h3>

      <!--============== Input Fields ==============-->
      <div class="input-fields">
        <input
          type="text"
          placeholder="Name"
          inputmode="latin"
          pattern="^[a-zA-Z\s]+$"
          title="Please insert a valid name."
          required
          autocomplete="name"
          class="input-field"
        />

        <input
          type="email"
          placeholder="Email"
          inputmode="latin"
          pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$"
          title="Please insert a valid email."
          required
          autocomplete="email"
          class="input-field"
        />

        <div class="input-password">
          <input
            [type]="isPasswordVisible() ? 'text' : 'password'"
            placeholder="Password"
            inputmode="latin"
            pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$"
            title="Please insert a valid password."
            required
            autocomplete="new-password"
            class="input-field password-field"
          />

          <button
            class="input-password-icon"
            [ngClass]="isPasswordVisible() ? 'active' : ''"
            [attr.aria-label]="isPasswordVisible() ? 'Hide password' : 'Show password'"
            aria-live="polite"
            (click)="togglePassword($event)"
          >
            <lucide-angular [img]="isPasswordVisible() ? Eye : EyeClosed" />
          </button>
        </div>
      </div>

      <!--============== Errors ==============-->

      <!--============== Submit ==============-->
      <button class="submit-btn">Sign Up</button>

      <!--============== Already have an account? ==============-->
      <small class="already-have-account">
        <a routerLink="/auth/sign-in">Already have an account? Sign in</a>
      </small>
    </form>
  </div>
</section>
